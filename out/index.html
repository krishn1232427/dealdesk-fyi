<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Opening Merchant | DealDesk</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell narrow-shell">
      <nav class="nav" aria-label="Primary">
        <a class="brand" href="/">DealDesk</a>
        <div class="links">
          <a href="/support/">Support</a>
          <a href="/privacy/">Privacy</a>
        </div>
      </nav>

      <section class="section">
        <p class="eyebrow">Affiliate Disclosure</p>
        <h1 class="compact-title">Opening merchant site.</h1>
        <p id="status">
          DealDesk may earn a commission from some purchases. The merchant cart remains
          the source of truth for final price, taxes, shipping, availability, and return terms.
        </p>
        <p id="fallback" hidden>
          <a class="button" id="merchant-link" href="/">Continue to merchant</a>
        </p>
      </section>
    </main>

    <script>
      (function () {
        var sovrnAPIKey = "c7f1da3c99daa51ab64a1d51fc8b088f";
        var awinPublisherID = "2973087";
        var params = new URLSearchParams(window.location.search);
        var rawURL = params.get("url");
        var subID = cleanSubID(params.get("subid")) || "dealdesksite";
        var network = (params.get("network") || "sovrn").toLowerCase();
        var status = document.getElementById("status");
        var fallback = document.getElementById("fallback");
        var merchantLink = document.getElementById("merchant-link");

        function fail(message) {
          status.textContent = message;
          fallback.hidden = true;
        }

        if (!rawURL) {
          fail("No merchant URL was provided.");
          return;
        }

        var destination;
        try {
          destination = new URL(rawURL);
        } catch (error) {
          fail("The merchant URL is not valid.");
          return;
        }

        if (destination.protocol !== "http:" && destination.protocol !== "https:") {
          fail("DealDesk can only open web merchant URLs.");
          return;
        }

        var affiliateURL = buildAffiliateURL(destination, network, subID);
        if (!affiliateURL) {
          return;
        }

        merchantLink.href = affiliateURL.href;
        fallback.hidden = false;
        window.setTimeout(function () {
          window.location.replace(affiliateURL.href);
        }, 350);

        function buildAffiliateURL(destinationURL, affiliateNetwork, clickRef) {
          if (affiliateNetwork === "awin") {
            var awinMID = cleanNumeric(params.get("awinmid"));
            if (!awinMID) {
              fail("Awin links need an advertiser ID before DealDesk can open the merchant.");
              return null;
            }

            var awinURL = new URL("https://www.awin1.com/cread.php");
            awinURL.searchParams.set("awinmid", awinMID);
            awinURL.searchParams.set("awinaffid", awinPublisherID);
            awinURL.searchParams.set("ued", destinationURL.href);
            if (clickRef) {
              awinURL.searchParams.set("clickref", clickRef);
            }
            return awinURL;
          }

          var sovrnURL = new URL("https://redirect.viglink.com/");
          sovrnURL.searchParams.set("key", sovrnAPIKey);
          sovrnURL.searchParams.set("u", destinationURL.href);
          sovrnURL.searchParams.set("cuid", clickRef);
          return sovrnURL;
        }

        function cleanSubID(value) {
          if (!value) return "";
          return value.replace(/[^a-zA-Z0-9]/g, "").slice(0, 32);
        }

        function cleanNumeric(value) {
          if (!value) return "";
          return value.replace(/\D/g, "").slice(0, 12);
        }
      })();
    </script>
  </body>
</html>
